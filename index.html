<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCENT ID — Luxury Fragrance Discovery</title>
    <meta
      name="description"
      content="SCENT ID is a premium fragrance discovery prototype blending personalized scent profiling, education, reviews, mood exploration, and luxury discovery kits."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Playfair Display', 'serif'],
            },
            colors: {
              ivory: '#f6f2eb',
              linen: '#fbf8f3',
              ink: '#111111',
              gold: '#b8955f',
              sand: '#e8dcc7',
              stone: '#6d655b',
            },
            boxShadow: {
              luxe: '0 24px 80px rgba(17, 17, 17, 0.08)',
              soft: '0 18px 40px rgba(17, 17, 17, 0.06)',
            },
            backgroundImage: {
              halo: 'radial-gradient(circle at top right, rgba(184,149,95,0.14), transparent 28%), radial-gradient(circle at bottom left, rgba(17,17,17,0.04), transparent 22%)',
              editorial: 'linear-gradient(135deg, rgba(255,255,255,0.95), rgba(247,240,229,0.92))',
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-linen font-sans text-ink antialiased selection:bg-gold/20">
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="data.js"></script>
    <script type="text/babel" src="script.js"></script>
  </body>
</html>
